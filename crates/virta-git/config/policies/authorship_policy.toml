# crates/virta-git/config/policies/authorship_policy.toml

[policy]
id = "AUTHORSHIP"
description = "Bind authorship to cryptographically signed metadata and repository signals via Typewriter."
enforced = true

[requirements]
# Every change that claims authorship must carry a cryptographic signature
# and a DID/Bostrom identity that can be verified off‑device.[file:11]
require_cryptographically_signed_authorship = true

# Commit / change metadata must be signed (e.g., via git signatures,
# ALN shard signatures, or Typewriter’s own signing channel).[file:3]
signed_metadata_required = true

# Virta/Typewriter must see cluster‑side signals (e.g., CI node, lane,
# and KER context) before treating authorship as valid.[file:3]
vm_cluster_signals_required = true

# Where to store proofs, disputes, and audit trails.
# These values are left as explicit enums so your Rust side can parse them
# into strongly‑typed storage backends.[file:11]
ownership_assertion_storage = "DATA_LAKE"
dispute_evidence_storage   = "DATA_LAKE"

# Optional: minimum K/E/R thresholds for accepting an authorship event.[file:11]
min_knowledge_factor       = 0.90
min_eco_impact_factor      = 0.90
max_risk_of_harm_factor    = 0.13

[typewriter_binding]
enabled = true

# Where Typewriter should pull canonical metadata for authorship
# (e.g., ALN shards, Rust workspace metadata, or repo‑level config).[file:3]
metadata_source = "workspace/.typewriter/metadata"

# Repository‑level signals that must be present and verified before
# an authorship claim is treated as valid. These can be interpreted
# by your Rust/ALN Typewriter client and mapped to concrete checks.[file:11]
repository_signals = [
  "git.commit.signed",              # Signed git commit or equivalent
  "aln.shard.evidencehex.present",  # EvidenceHex present on shard
  "aln.shard.signinghex.valid",     # DID/Bostrom signature valid
  "ci.vm_lane_bound",               # CI lane / VM lane matches policy
  "ci.ker_window.deployment_ok"     # KER triad passes deployment gate
]

# Optional: explicit mapping from signal names to ALN families, so that
# Typewriter and Rust tooling can locate the right grammars.[file:3]
[aln_families]
authorship_shard_family       = "VirtaGitAuthorshipShard2026v1"
authorship_corridor_family    = "AuthorshipCorridorBands2026v1"
authorship_provenance_family  = "AuthorshipProvenanceShard2026v1"

# Optional: Bostrom / DID integration hints – these can be consumed by
# your signer/verifier crates without baking secrets into the config.[file:11]
[bostrom_identities]
primary_address   = "bostrom18sd2ujv24ual9c9pshtxys6j8knh6xaead9ye7"
secure_address    = "bostrom1ldgmtf20d6604a24ztr0jxht7xt7az4jhkmsrc"
